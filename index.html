<canvas id="matrix"></canvas>

<script>

// MATRIX RAIN

const canvas=document.getElementById('matrix');
const ctx=canvas.getContext('2d');

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const chars="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const size=16;
const cols=canvas.width/size;
const drops=[];

for(let i=0;i<cols;i++) drops[i]=1;

function matrix(){
ctx.fillStyle="rgba(0,0,0,.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff88";
ctx.font=size+"px monospace";

for(let i=0;i<drops.length;i++){
let text=chars[Math.floor(Math.random()*chars.length)];

ctx.fillText(text,i*size,drops[i]*size);

if(drops[i]*size>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}
setInterval(matrix,35);

// TERMINAL

const terminal=document.getElementById("terminal");

const lines=[
"INITIALIZING MISHRABYTE AI...",
"AI CORE ONLINE",
"NETWORK ONLINE",
"SECURITY ONLINE",
"USER DETECTED",
"SCANNING DEVICE...",
"DEVICE VERIFIED",
"ACCESS LEVEL: UNKNOWN",
"DOWNLOADING USER PROFILE..."
];

let i=0;

function nextLine(){

if(i<lines.length){

terminal.innerHTML += lines[i] + "<br>";
i++;

setTimeout(nextLine,1000);

}else{

startPrank();

}
}

nextLine();

function startPrank(){

terminal.innerHTML +=
"<br><span style='color:red'>SECURITY BREACH DETECTED</span>";

document.body.classList.add("glitch");

setTimeout(()=>{

document.body.classList.remove("glitch");

terminal.style.display="none";

let cd=document.getElementById("countdown");
cd.style.display="block";

let n=5;

cd.innerHTML=n;

let timer=setInterval(()=>{

n--;
cd.innerHTML=n;

if(n<=0){

clearInterval(timer);

cd.innerHTML="💀";

setTimeout(showPortal,1500);

}

},1000);

},2500);

}

function showPortal(){

document.getElementById("countdown").style.display="none";

document.getElementById("portal").style.display="block";

alert("RELAX 😎 YOU JUST ENTERED THE MISHRABYTE PORTAL");

}
</script>
