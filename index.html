<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MishraByte Secret Portal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
font-family:Consolas, monospace;
color:#00ff00;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

#container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
}

#title{
font-size:40px;
text-shadow:0 0 15px #00ff00;
margin-bottom:20px;
}

#scan{
font-size:22px;
margin-bottom:20px;
}

.progress{
width:350px;
height:25px;
border:2px solid #00ff00;
margin:auto;
}

.progress-fill{
width:0%;
height:100%;
background:#00ff00;
transition:width .1s;
}

#percent{
margin-top:10px;
font-size:20px;
}

#portal{
display:none;
animation:fadeIn 2s;
}

.logo{
font-size:70px;
font-weight:bold;
color:#fff;
text-shadow:0 0 25px cyan;
}

.tagline{
font-size:24px;
color:#00ffff;
margin-top:10px;
}

.services{
margin-top:20px;
font-size:18px;
color:#fff;
}

.secret{
margin-top:25px;
font-size:22px;
color:#00ff00;
}

.button{
display:inline-block;
margin-top:25px;
padding:12px 28px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="container">

<div id="loader">

<div id="title">ACCESSING DEVICE...</div>

<div id="scan">Initializing Scan...</div>

<div class="progress">
<div class="progress-fill" id="fill"></div>
</div>

<div id="percent">0%</div>

</div>

<div id="portal">

<div class="logo">🚀 MishraByte</div>

<div class="tagline">
Technology For The Future
</div>

<div class="secret">
YOU HAVE UNLOCKED THE SECRET TECH PORTAL
</div>

<div class="services">
Computers • Electronics • Accessories • Networking
</div>

<a class="button"
href="https://wa.me/919999999999"
target="_blank">
Contact MishraByte
</a>

</div>

</div>

<script>

// MATRIX EFFECT

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters =
"01ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];

for(let i=0;i<columns;i++){
drops[i]=1;
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff00";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text =
letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(
text,
i*fontSize,
drops[i]*fontSize
);

if(
drops[i]*fontSize > canvas.height &&
Math.random() > 0.975
){
drops[i]=0;
}

drops[i]++;
}
}

setInterval(draw,35);

// LOADING EFFECT

let progress=0;

const fill =
document.getElementById("fill");

const percent =
document.getElementById("percent");

const scan =
document.getElementById("scan");

const loader =
document.getElementById("loader");

const portal =
document.getElementById("portal");

const timer = setInterval(()=>{

progress += 2;

fill.style.width =
progress + "%";

percent.innerHTML =
progress + "%";

if(progress >= 100){

clearInterval(timer);

scan.innerHTML =
"ACCESS GRANTED";

setTimeout(()=>{

loader.style.display="none";
portal.style.display="block";

},2000);
}

},100);

</script>

</body>
</html>
